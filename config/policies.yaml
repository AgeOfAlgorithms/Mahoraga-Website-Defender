# Response policies — what the system can do autonomously vs. requiring human approval
#
# auto_apply: System acts immediately, no human needed
# auto_apply_notify: System acts immediately, sends notification
# human_required: System proposes action, waits for human approval

response_policies:
  ip_block:
    policy: auto_apply
    description: "Block malicious IPs at the WAF/nginx level"
    max_duration_hours: 24  # auto-blocks expire after this

  rate_limit:
    policy: auto_apply
    description: "Increase rate limiting for abusive IPs"

  waf_rule_add:
    policy: auto_apply_notify
    description: "Add new WAF/nginx rules to block attack patterns"

  security_header:
    policy: auto_apply_notify
    description: "Add or strengthen security headers"

  config_change:
    policy: auto_apply_notify
    description: "Modify application configuration"

  code_fix:
    policy: human_required
    description: "Patch application source code"

  dependency_update:
    policy: human_required
    description: "Update package dependencies"

  database_change:
    policy: human_required
    description: "Any database schema or data modification"

  firewall_rule_delete:
    policy: human_required
    description: "Remove existing firewall/WAF rules"

# Tester complaint handling
tester:
  ignore_minor_complaints: true  # other agents may proceed despite minor issues
  block_on_major_complaints: true  # major complaints halt deployment
  max_retries_on_failure: 2  # fixer gets N attempts before escalating to human
