worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s;

    lua_shared_dict session_cache 10m;
    lua_shared_dict response_bodies 50m;

    # Use real client IP (X-Forwarded-For from ngrok/proxy, or remote_addr)
    map $http_x_forwarded_for $real_client_ip {
        default $http_x_forwarded_for;
        ""      $remote_addr;
    }

    # Detailed log format — includes which env (prod/shadow) served the request
    log_format detailed '$real_client_ip - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time '
                        'auth="$http_authorization" '
                        'body="$request_body" '
                        'env="$target_env"';

    # Shadow-specific log: captures response body for LLM analysis
    log_format shadow_detailed '$real_client_ip [$time_local] '
                               '"$request" $status '
                               'auth="$http_authorization" '
                               'req_body="$request_body" '
                               'resp_body="$resp_body"';

    access_log /var/log/nginx/access.log detailed;
    access_log /var/log/nginx/shadow.log shadow_detailed if=$is_shadow;
    error_log /var/log/nginx/error.log warn;

    client_body_buffer_size 16k;
    client_max_body_size 10m;

    # ── Upstreams ─────────────────────────────────────────────────
    upstream crapi-prod {
        server crapi-web:80;
    }

    upstream crapi-shadow {
        server shadow-web:80;
    }

    upstream vuln-chains {
        server vuln-chains:7070;
    }

    # ── Rate limit zones ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_strict:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_tight:10m rate=3r/m;

    # ── Main server ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Variable set by Lua — "prod" or "shadow"
        set $target_env "prod";
        set $backend "crapi-web";
        set $resp_body "";
        set $is_shadow "0";

        # ── Lua session router ────────────────────────────────────
        # Runs on every request. Checks Redis for shadow redirect
        # flags on the auth token and IP:JA3 composite fingerprint.
        # IP:JA3 prevents collision when two attackers use the same tool.
        # ~1ms overhead (Redis on same network).
        access_by_lua_block {
            local token = ngx.var.http_authorization or ""
            local ua = ngx.var.http_user_agent or ""
            -- Use X-Forwarded-For (ngrok/proxy) or fall back to remote_addr
            local ip = ngx.var.http_x_forwarded_for or ngx.var.remote_addr or ""
            -- Take only the first IP if X-Forwarded-For has a chain
            ip = ip:match("^([^,]+)") or ip
            local fingerprint = ip .. ":" .. ua  -- composite session identity

            -- Skip check for static assets and health endpoints
            local uri = ngx.var.uri
            if uri:match("^/static") or uri:match("^/assets") or uri == "/health" then
                return
            end

            -- Check Redis for shadow redirect flags
            local redis = require "resty.redis"
            local red = redis:new()
            red:set_timeouts(100, 100, 100)  -- 100ms connect/send/read

            local ok, err = red:connect("defender-redis", 6379)
            if not ok then
                return  -- Redis down = default to prod
            end

            -- Check token-level redirect
            if token ~= "" and token ~= "-" then
                local shadow_flag = red:get("shadow:token:" .. token)
                if shadow_flag and shadow_flag ~= ngx.null then
                    ngx.var.target_env = "shadow"
                    ngx.var.backend = "shadow-web"
                    red:set_keepalive(10000, 100)
                    return
                end
            end

            -- Check IP:JA3 composite redirect (survives token rotation)
            if fingerprint ~= ":" then
                local shadow_flag = red:get("shadow:ja3:" .. fingerprint)
                if shadow_flag and shadow_flag ~= ngx.null then
                    ngx.var.target_env = "shadow"
                    ngx.var.backend = "shadow-web"
                    -- Also flag the current token for faster future checks
                    if token ~= "" and token ~= "-" then
                        red:setex("shadow:token:" .. token, 86400, shadow_flag)
                    end
                    red:set_keepalive(10000, 100)
                    return
                end
            end

            red:set_keepalive(10000, 100)
        }

        # ── Honeypot endpoints (always, both envs) ────────────────

        location ~ ^/(\.env|\.git|wp-admin|phpinfo|\.aws|\.ssh) {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","note":"debug endpoint active"}';
        }

        location = /identity/api/v3/admin/users {
            add_header Content-Type application/json;
            return 200 '{"users":[{"id":1,"email":"sysadmin@vehitrack.internal","role":"SUPER_ADMIN","_debug_token":"eyJ-HONEYPOT-TOKEN-1"},{"id":2,"email":"dbadmin@vehitrack.internal","role":"DB_ADMIN","_debug_token":"eyJ-HONEYPOT-TOKEN-2"}],"total":2,"_note":"internal API"}';
        }
        location = /identity/api/v3/admin/config {
            add_header Content-Type application/json;
            return 200 '{"jwt_secret":"crapi-internal-key-rotate-q3","db_host":"postgresdb:5432","db_password":"cr4p1_s3cr3t_FAKE","redis_host":"defender-redis:6379","environment":"staging","debug_mode":true}';
        }
        location = /identity/api/debug/tokens {
            add_header Content-Type application/json;
            return 200 '{"active_sessions":47,"admin_token":"eyJ-HONEYPOT-ADMIN","service_account_key":"svc-acct-FAKE-4f8a9b2c","_warning":"debug endpoint - disable before production"}';
        }
        location = /identity/api/internal/health {
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","version":"2.4.1-internal","uptime_hours":72,"connected_services":["postgresdb:5432","mongodb:27017","redis:6379","control-plane:9090"]}';
        }
        location ~ ^/identity/api/v3/admin {
            add_header Content-Type application/json;
            return 200 '{"message":"admin endpoint active","_internal":true}';
        }
        location ~ ^/community/api/v2/(admin|internal|debug)/ {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","_internal":true,"data":{"mongo_uri":"mongodb://admin:cr4p1_FAKE@mongodb:27017/crapi","api_key":"community-svc-HONEYPOT-key-9f3a","debug_enabled":true}}';
        }
        location ~ ^/(admin/debug|api/v1/internal) {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","note":"debug endpoint active"}';
        }

        # ── Challenge homepage ────────────────────────────────────
        location = /challenge {
            proxy_pass http://vuln-chains/chains/challenge;
            proxy_set_header Host $host;
        }

        # ── Workshop honeypots (Django, hot-reload) ───────────────
        location ~ ^/workshop/api/internal/ {
            set $ws_backend http://crapi-web;
            proxy_pass $ws_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Vuln chains (always prod) ─────────────────────────────
        location /chains/ {
            proxy_pass http://vuln-chains;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Chatbot (dynamic resolution) ──────────────────────────
        location /chatbot/ {
            limit_req zone=api_strict burst=10 nodelay;
            set $chatbot_up http://crapi-chatbot:5002;
            proxy_pass $chatbot_up;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # ── Community posts: strip PII from author objects ─────────
        location ~ ^/community/api/v2/community/posts {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            body_filter_by_lua_block {
                local chunk = ngx.arg[1] or ""
                local eof = ngx.arg[2]
                local buf = ngx.ctx.buffer or ""
                buf = buf .. chunk
                ngx.arg[1] = nil

                if eof then
                    -- Strip email and vehicleid from author objects
                    buf = buf:gsub('"email"%s*:%s*"[^"]*"%s*,?', '')
                    buf = buf:gsub('"vehicleid"%s*:%s*"[^"]*"%s*,?', '')
                    -- Clean up trailing commas before closing brace
                    buf = buf:gsub(',%s*}', '}')
                    ngx.arg[1] = buf
                end
                ngx.ctx.buffer = buf
            }

            header_filter_by_lua_block {
                ngx.header.content_length = nil
            }
        }

        # ── Default: route to prod OR shadow based on session ─────
        # $backend is set to "crapi-web" or "shadow-web" by the
        # access_by_lua_block at the top of this server block.
        location / {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Capture response body for shadow requests (for LLM analysis)
            body_filter_by_lua_block {
                if ngx.var.target_env == "shadow" then
                    ngx.var.is_shadow = "1"
                    local chunk = ngx.arg[1] or ""
                    local body = ngx.ctx.resp_body or ""
                    -- Limit to first 2KB to avoid memory bloat
                    if #body < 2048 then
                        ngx.ctx.resp_body = body .. chunk
                    end
                end
            }

            log_by_lua_block {
                if ngx.var.target_env == "shadow" and ngx.ctx.resp_body then
                    -- Escape for log safety (newlines, quotes)
                    local safe = ngx.ctx.resp_body:gsub("\n", "\\n"):gsub('"', '\\"')
                    -- Truncate
                    if #safe > 2000 then safe = safe:sub(1, 2000) .. "..." end
                    ngx.var.resp_body = safe
                end
            }

            sub_filter '</body>' '<!-- TODO: remove before prod deployment\n     Admin panel: /identity/api/v3/admin/users\n     Internal config: /workshop/api/internal/config\n     Debug tokens: /identity/api/debug/tokens\n     Fleet dashboard: /workshop/api/management/dashboard\n     Key management: /workshop/api/management/keys\n     Fleet status (internal): /workshop/api/internal/fleet-status (not exposed externally)\n     NOTE: only tested GET/POST on video endpoints, other verbs may be exposed\n     data-api-key="vtrk-web-f84a2c01" data-env="staging"\n-->\n</body>';
            sub_filter_once on;
            sub_filter_types text/html;
        }
    }
}
